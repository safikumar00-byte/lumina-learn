name: Content Check

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  content-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install dependencies
        run: npm ci
      - name: Run content smoke check
        run: npm run content:check
