name: Auto Content Update

on:
  push:
    paths:
      - 'content/**'
      - 'scripts/**'
  workflow_dispatch: {}

jobs:
  update-index-and-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Run content index updater
        run: npm run content:update-index

      - name: Commit regenerated index.md files
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add content/courses/*/index.md || true
          if git diff --staged --quiet; then
            echo "No index changes to commit"
          else
            git commit -m "chore(content): regenerate course index" || true
            git push
          fi
